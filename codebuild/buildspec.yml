version: 0.2

# GITHUB_TOKEN is optional — scripts fall back to unauthenticated API (60 req/hr).
# To raise the rate limit, create a Secrets Manager secret named "github-token"
# with a key "token" and uncomment the block below:
#
# env:
#   secrets-manager:
#     GITHUB_TOKEN: "github-token:token"
#
# PIPELINE_TARGET controls which content sources are ingested (default: all):
#   all       — full pipeline (docs + registry modules + discuss + blogs + issues)
#   docs      — product documentation from HashiCorp repos only
#   registry  — Terraform public registry modules only
#   discuss   — HashiCorp Discuss threads only
#   blogs     — HashiCorp blog posts only

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - pip install -r codebuild/scripts/requirements.txt

  pre_build:
    commands:
      - 'export TARGET="${PIPELINE_TARGET:-all}"'
      - 'echo "Pipeline target: ${TARGET}"'
      - |
        # Clone product repos for docs and full runs
        if [[ "$TARGET" == "all" || "$TARGET" == "docs" ]]; then
          echo "Cloning HashiCorp repositories..."
          bash codebuild/scripts/clone_repos.sh
        fi
      - |
        # Discover and clone Terraform registry modules for registry and full runs
        if [[ "$TARGET" == "all" || "$TARGET" == "registry" ]]; then
          echo "Discovering Terraform registry modules..."
          python3 codebuild/scripts/discover_modules.py
          bash codebuild/scripts/clone_modules.sh
        fi

  build:
    commands:
      - 'export TARGET="${PIPELINE_TARGET:-all}"'
      - |
        if [[ "$TARGET" == "all" || "$TARGET" == "docs" || "$TARGET" == "registry" ]]; then
          echo "Processing documentation (semantic section splitting)..."
          python3 codebuild/scripts/process_docs.py
        fi
      - |
        echo "Fetching API sources..."
        PIDS=()
        if [[ "$TARGET" == "all" ]]; then
          python3 codebuild/scripts/fetch_github_issues.py &
          PIDS+=($!)
        fi
        if [[ "$TARGET" == "all" || "$TARGET" == "discuss" ]]; then
          python3 codebuild/scripts/fetch_discuss.py &
          PIDS+=($!)
        fi
        if [[ "$TARGET" == "all" || "$TARGET" == "blogs" ]]; then
          python3 codebuild/scripts/fetch_blogs.py &
          PIDS+=($!)
        fi
        [[ ${#PIDS[@]} -gt 0 ]] && wait "${PIDS[@]}" || true
      - echo "Deduplicating across all sources..."
      - python3 codebuild/scripts/deduplicate.py
      - echo "Generating metadata sidecar files..."
      - python3 codebuild/scripts/generate_metadata.py --bucket "${RAG_BUCKET}"

  post_build:
    commands:
      - echo "Uploading processed documents to S3..."
      - aws s3 sync /codebuild/output/cleaned/ "s3://${RAG_BUCKET}/" --delete
      - echo "Upload complete."

cache:
  paths:
    - '/root/.cache/pip/**/*'
