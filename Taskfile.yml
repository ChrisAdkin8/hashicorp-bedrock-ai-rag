version: "3"

# HashiCorp RAG + Graph Pipeline — Task runner
#
# Quick start (provision everything):
#   task up REPO_URI=https://github.com/org/repo
#
# REGION defaults to us-east-1. Override with REGION=us-west-2 if needed.
#
# State bucket name is deterministic: <ACCOUNT_ID>-tf-state-<8-char hash>

vars:
  TF_DIR: terraform
  PYTHON: .venv/bin/python3
  # REGION — auto-detected from terraform/terraform.tfvars; override via CLI:
  #   task <target> REGION=eu-west-1
  _REGION_FROM_TFVARS:
    sh: 'grep -m1 "^region" terraform/terraform.tfvars 2>/dev/null | awk -F"\"" "{print \$2}" || echo ""'
  REGION: '{{.REGION | default ._REGION_FROM_TFVARS | default "us-east-1"}}'
  ACCOUNT_ID:
    sh: 'aws sts get-caller-identity --query Account --output text 2>/dev/null || echo ""'
  STATE_BUCKET:
    sh: 'echo "{{.ACCOUNT_ID}}-tf-state-$(echo -n "{{.ACCOUNT_ID}}" | sha256sum | cut -c1-8)"'

tasks:

  default:
    desc: "List available tasks"
    cmds:
      - task --list

  # ── Authentication ──────────────────────────────────────────────────────────

  login:
    desc: "Verify AWS credentials and print caller identity"
    summary: |
      Checks that valid AWS credentials are configured. Prints the caller identity.

      For AWS SSO:   aws sso login --profile my-profile
      For IAM keys:  aws configure

      Example:
        task login
    cmds:
      - aws sts get-caller-identity
      - 'echo "Region: {{.REGION}}"'

  # ── Primary entrypoint ──────────────────────────────────────────────────────

  up:
    desc: "Full end-to-end deploy: preflight → bootstrap → apply → pipeline"
    summary: |
      Provisions all infrastructure and triggers the first docs ingestion run.
      Idempotent — safe to re-run.

      Steps:
        0. Preflight checks (tools, auth, Python packages, files, Terraform)
        1. Bootstrap — create S3 state bucket via terraform/bootstrap
        2. terraform apply — IAM, S3, Kendra, CodeBuild, Step Functions, EventBridge
        3. First docs pipeline run (skip with SKIP_PIPELINE=true)

      Note: Kendra index creation takes 10–30 minutes on first deploy.

      Required: REPO_URI
      Optional: REGION, SKIP_PIPELINE=true

      Example:
        task up REPO_URI=https://github.com/org/repo
        task up REPO_URI=https://github.com/org/repo REGION=eu-west-1 SKIP_PIPELINE=true
    requires:
      vars: [REPO_URI]
    cmds:
      - task: preflight
      - |
        scripts/deploy.sh \
          --region   {{.REGION}}   \
          --repo-uri {{.REPO_URI}} \
          {{if eq .SKIP_PIPELINE "true"}}--skip-pipeline{{end}}

  # ── Bootstrap ───────────────────────────────────────────────────────────────

  bootstrap:
    desc: "Create the S3 state bucket via terraform/bootstrap (one-time, idempotent)"
    summary: |
      Applies the terraform/bootstrap root module which creates the S3 bucket
      used for Terraform remote state. Uses a local backend so it can run before
      the main module is initialised. Safe to re-run — bucket creation is idempotent.

      Called automatically by `task up` via scripts/deploy.sh.

      Example:
        task bootstrap
        task bootstrap REGION=eu-west-1
    cmds:
      - terraform -chdir={{.TF_DIR}}/bootstrap init -input=false
      - terraform -chdir={{.TF_DIR}}/bootstrap apply -auto-approve -var="region={{.REGION}}"
      - 'echo "State bucket: $(terraform -chdir={{.TF_DIR}}/bootstrap output -raw bucket_name)"'

  # ── OIDC provider ───────────────────────────────────────────────────────────

  oidc:import:
    desc: "Import the GitHub Actions OIDC provider into Terraform state if it already exists"
    summary: |
      If the GitHub OIDC provider already exists in the AWS account but is not
      yet tracked in Terraform state, imports it to prevent a duplicate-creation
      error on the next apply. Safe to run on every deploy.

      Example:
        task oidc:import
    deps: [init]
    vars:
      OIDC_ARN:
        sh: 'aws iam list-open-id-connect-providers --query "OpenIDConnectProviderList[].Arn" --output text 2>/dev/null | tr "\t" "\n" | grep "token.actions.githubusercontent.com" || true'
    cmds:
      - |
        if [ -z "{{.OIDC_ARN}}" ]; then
          echo "OIDC: provider not found in AWS — will be created by terraform apply."
          exit 0
        fi
        echo "OIDC: found existing provider {{.OIDC_ARN}}"
        STATE_ADDR="module.hashicorp_docs_pipeline.aws_iam_openid_connect_provider.github[0]"
        if terraform -chdir={{.TF_DIR}} state show "${STATE_ADDR}" &>/dev/null; then
          echo "OIDC: already in Terraform state — nothing to do."
        else
          echo "OIDC: importing into Terraform state..."
          terraform -chdir={{.TF_DIR}} import "${STATE_ADDR}" "{{.OIDC_ARN}}"
          echo "OIDC: import complete."
        fi

  # ── Terraform ───────────────────────────────────────────────────────────────

  fmt:
    desc: "Format all Terraform files in-place"
    cmds:
      - terraform -chdir={{.TF_DIR}} fmt -recursive

  fmt:check:
    desc: "Check Terraform formatting without modifying files (CI gate)"
    cmds:
      - terraform -chdir={{.TF_DIR}} fmt -check -recursive

  init:
    desc: "Initialise Terraform with remote S3 backend"
    env:
      AWS_DEFAULT_REGION: '{{.REGION}}'
    vars:
      STATE_BUCKET_REGION:
        sh: |
          r=$(aws s3api get-bucket-location --bucket {{.STATE_BUCKET}} --query LocationConstraint --output text 2>/dev/null || echo "{{.REGION}}")
          if [ "$r" = "None" ] || [ -z "$r" ]; then r="us-east-1"; fi
          echo "$r"
    cmds:
      - |
        terraform -chdir={{.TF_DIR}} init \
          -backend-config="bucket={{.STATE_BUCKET}}" \
          -backend-config="region={{.STATE_BUCKET_REGION}}" \
          -reconfigure \
          -input=false

  init:upgrade:
    desc: "Re-initialise Terraform and upgrade providers"
    env:
      AWS_DEFAULT_REGION: '{{.REGION}}'
    vars:
      STATE_BUCKET_REGION:
        sh: |
          r=$(aws s3api get-bucket-location --bucket {{.STATE_BUCKET}} --query LocationConstraint --output text 2>/dev/null || echo "{{.REGION}}")
          if [ "$r" = "None" ] || [ -z "$r" ]; then r="us-east-1"; fi
          echo "$r"
    cmds:
      - |
        terraform -chdir={{.TF_DIR}} init \
          -backend-config="bucket={{.STATE_BUCKET}}" \
          -backend-config="region={{.STATE_BUCKET_REGION}}" \
          -input=false -upgrade

  validate:
    desc: "Run terraform validate"
    deps: [init]
    cmds:
      - terraform -chdir={{.TF_DIR}} validate

  plan:
    desc: "Run terraform plan and save to tfplan"
    deps: [init]
    cmds:
      - terraform -chdir={{.TF_DIR}} plan -input=false -out=tfplan

  apply:
    desc: "Run terraform plan interactively and apply if approved"
    prompt: "Apply terraform changes to AWS account {{.ACCOUNT_ID}}? This modifies real resources."
    cmds:
      - terraform -chdir={{.TF_DIR}} apply -input=false

  down:
    desc: "Alias for destroy — tear down all Terraform-managed infrastructure"
    cmds:
      - task: destroy

  destroy:
    desc: "Destroy all Terraform-managed infrastructure"
    deps: [init]
    prompt: "Destroy ALL infrastructure in AWS account {{.ACCOUNT_ID}}? This is irreversible."
    cmds:
      - terraform -chdir={{.TF_DIR}} destroy -auto-approve -input=false

  output:
    desc: "Show Terraform outputs"
    deps: [init]
    cmds:
      - terraform -chdir={{.TF_DIR}} output

  # ── Docs pipeline (Kendra RAG) ──────────────────────────────────────────────

  pipeline:run:
    desc: "Trigger the docs ingestion pipeline and wait for completion"
    summary: |
      Starts the Step Functions docs pipeline and polls until it finishes.

      TARGET controls which content sources are ingested (default: all):
        all       — full pipeline (docs + registry modules + discuss + blogs + issues)
        docs      — product documentation only
        registry  — Terraform public registry modules only
        discuss   — HashiCorp Discuss threads only
        blogs     — HashiCorp blog posts only

      Example:
        task pipeline:run
        task pipeline:run TARGET=blogs
        task pipeline:run KENDRA_INDEX_ID=ABCDEFGHIJ KENDRA_DS_ID=KLMNOPQRST
    deps: [init]
    vars:
      TARGET: '{{.TARGET | default "all"}}'
      STATE_MACHINE_ARN:
        sh: 'terraform -chdir={{.TF_DIR}} output -raw state_machine_arn 2>/dev/null'
      RAG_BUCKET:
        sh: 'terraform -chdir={{.TF_DIR}} output -raw rag_bucket_name 2>/dev/null'
      KENDRA_INDEX_ID:
        sh: >
          {{if .KENDRA_INDEX_ID}}echo "{{.KENDRA_INDEX_ID}}"{{else}}
          terraform -chdir={{.TF_DIR}} output -raw kendra_index_id 2>/dev/null || echo ""
          {{end}}
      KENDRA_DS_ID:
        sh: >
          {{if .KENDRA_DS_ID}}echo "{{.KENDRA_DS_ID}}"{{else}}
          terraform -chdir={{.TF_DIR}} output -raw kendra_data_source_id 2>/dev/null || echo ""
          {{end}}
      REPO_URI:
        sh: 'grep repo_uri {{.TF_DIR}}/terraform.tfvars 2>/dev/null | cut -d\" -f2 || echo ""'
    cmds:
      - |
        case "{{.TARGET}}" in
          all|docs|registry|discuss|blogs) ;;
          *) echo "Error: TARGET must be one of: all, docs, registry, discuss, blogs"; exit 1 ;;
        esac
        scripts/run_pipeline.sh \
          --state-machine-arn      {{.STATE_MACHINE_ARN}} \
          --region                 {{.REGION}} \
          --kendra-index-id        {{.KENDRA_INDEX_ID}} \
          --kendra-data-source-id  {{.KENDRA_DS_ID}} \
          --bucket-name            {{.RAG_BUCKET}} \
          --repo-url               {{.REPO_URI}} \
          --target                 {{.TARGET}} \
          --wait

  pipeline:test:
    desc: "Run retrieval quality tests against the Kendra index"
    summary: |
      Runs 10 test queries against the Kendra index and reports result counts
      and confidence levels across all product families and source types.

      Example:
        task pipeline:test KENDRA_INDEX_ID=ABCDEFGHIJ
        task pipeline:test KENDRA_INDEX_ID=ABCDEFGHIJ MIN_CONFIDENCE=MEDIUM
    requires:
      vars: [KENDRA_INDEX_ID]
    vars:
      MIN_CONFIDENCE: '{{.MIN_CONFIDENCE | default "LOW"}}'
    cmds:
      - "{{.PYTHON}} scripts/test_retrieval.py --region {{.REGION}} --kendra-index-id {{.KENDRA_INDEX_ID}} --min-confidence {{.MIN_CONFIDENCE}}"

  pipeline:token-efficiency:
    desc: "Compare RAG retrieval token cost against raw documentation"
    summary: |
      Runs cross-product queries and compares token cost of RAG retrieval
      against pasting full documentation pages.

      KENDRA_INDEX_ID and REGION are auto-detected from Terraform output.
      Install tiktoken for precise token counts: pip install tiktoken

      Example:
        task pipeline:token-efficiency
        task pipeline:token-efficiency KENDRA_INDEX_ID=ABCDEFGHIJ
    deps: [init]
    vars:
      KENDRA_INDEX_ID:
        sh: >
          {{if .KENDRA_INDEX_ID}}echo "{{.KENDRA_INDEX_ID}}"{{else}}
          terraform -chdir={{.TF_DIR}} output -raw kendra_index_id 2>/dev/null || echo ""
          {{end}}
      EFFECTIVE_REGION:
        sh: >
          terraform -chdir={{.TF_DIR}} output -raw aws_region 2>/dev/null ||
          echo "{{.REGION}}"
    cmds:
      - |
        if [ -z "{{.KENDRA_INDEX_ID}}" ]; then
          echo "Error: KENDRA_INDEX_ID could not be detected from Terraform output."
          echo "Pass it explicitly: task pipeline:token-efficiency KENDRA_INDEX_ID=<id>"
          exit 1
        fi
        {{.PYTHON}} scripts/test_token_efficiency.py \
          --region          {{.EFFECTIVE_REGION}} \
          --kendra-index-id {{.KENDRA_INDEX_ID}}

  pipeline:status:
    desc: "Show the last 5 docs pipeline executions"
    summary: |
      Lists recent Step Functions executions for the docs pipeline,
      showing status and start time.

      Example:
        task pipeline:status
    deps: [init]
    cmds:
      - |
        STATE_MACHINE_ARN=$(terraform -chdir={{.TF_DIR}} output -raw state_machine_arn 2>/dev/null || echo "")
        if [ -z "${STATE_MACHINE_ARN}" ]; then
          echo "No docs state machine found — has 'task apply' been run?"
          exit 0
        fi
        aws stepfunctions list-executions \
          --state-machine-arn "${STATE_MACHINE_ARN}" \
          --region            "{{.REGION}}" \
          --max-results       5 \
          --query "executions[].{Status:status, Started:startDate, Name:name}" \
          --output table

  # ── Graph pipeline (Neptune) ────────────────────────────────────────────────

  graph:populate:
    desc: "Trigger the graph pipeline to extract Terraform plans and load into Neptune"
    summary: |
      Starts the Step Functions graph pipeline which:
        1. Clones each Terraform workspace repo
        2. Runs terraform plan + rover to extract the resource graph
        3. Loads nodes and edges into Neptune via openCypher MERGE statements

      GRAPH_REPO_URIS is a space-separated list of GitHub HTTPS repo URLs.
      Auto-detected from terraform.tfvars (graph_repo_uris) when not provided.

      Requires create_neptune=true and a deployed Neptune cluster.
      Run 'task apply' with create_neptune=true in terraform.tfvars first.

      Example:
        task graph:populate GRAPH_REPO_URIS="https://github.com/org/infra-repo"
        task graph:populate GRAPH_REPO_URIS="https://github.com/org/a https://github.com/org/b"
        task graph:populate   # uses graph_repo_uris from terraform.tfvars
    deps: [init]
    cmds:
      - |
        # Resolve outputs after init has run
        GRAPH_STATE_MACHINE_ARN=$(terraform -chdir={{.TF_DIR}} output -raw graph_state_machine_arn 2>/dev/null || echo "")
        NEPTUNE_ENDPOINT=$(terraform -chdir={{.TF_DIR}} output -raw neptune_cluster_endpoint 2>/dev/null || echo "")
        NEPTUNE_PORT=$(terraform -chdir={{.TF_DIR}} output -raw neptune_port 2>/dev/null || echo "8182")
        GRAPH_STAGING_BUCKET=$(terraform -chdir={{.TF_DIR}} output -raw graph_staging_bucket_name 2>/dev/null || echo "")
        if [ -n "{{.GRAPH_REPO_URIS}}" ]; then
          REPO_URIS_RAW="{{.GRAPH_REPO_URIS}}"
        else
          REPO_URIS_RAW=$(grep graph_repo_uris {{.TF_DIR}}/terraform.tfvars 2>/dev/null | grep -oE '"[^"]+"' | tr -d '"' | tr '\n' ' ' || echo "")
        fi
        if [ -z "${GRAPH_STATE_MACHINE_ARN}" ]; then
          echo "Error: graph_state_machine_arn not found in Terraform output."
          echo "Ensure create_neptune=true and run 'task apply' first."
          exit 1
        fi
        if [ -z "${REPO_URIS_RAW}" ]; then
          echo "Error: No repo URIs found."
          echo "Pass GRAPH_REPO_URIS or set graph_repo_uris in terraform.tfvars."
          exit 1
        fi
        # Build JSON array from space-separated URIs
        REPO_JSON=$(echo "${REPO_URIS_RAW}" | tr ' ' '\n' | grep -v '^$' | jq -R . | jq -s .)
        INPUT=$(jq -n \
          --argjson repo_uris    "${REPO_JSON}" \
          --arg     bucket       "${GRAPH_STAGING_BUCKET}" \
          --arg     endpoint     "${NEPTUNE_ENDPOINT}" \
          --arg     port         "${NEPTUNE_PORT}" \
          --arg     region       "{{.REGION}}" \
          '{repo_uris: $repo_uris, graph_staging_bucket: $bucket, neptune_endpoint: $endpoint, neptune_port: $port, region: $region}')
        echo "Starting graph pipeline..."
        echo "Repos: $(echo "${REPO_JSON}" | jq -r '.[]')"
        EXECUTION_ARN=$(aws stepfunctions start-execution \
          --state-machine-arn "${GRAPH_STATE_MACHINE_ARN}" \
          --input             "${INPUT}" \
          --region            "{{.REGION}}" \
          --query executionArn --output text)
        echo "Execution: ${EXECUTION_ARN}"
        echo "Polling for completion..."
        while true; do
          STATUS=$(aws stepfunctions describe-execution \
            --execution-arn "${EXECUTION_ARN}" \
            --region        "{{.REGION}}" \
            --query         status --output text)
          echo "  Status: ${STATUS}"
          case "${STATUS}" in
            SUCCEEDED) echo "Graph pipeline complete."; break ;;
            FAILED|TIMED_OUT|ABORTED)
              echo "Graph pipeline ${STATUS}. Check Step Functions console for details."
              exit 1 ;;
            *) sleep 30 ;;
          esac
        done

  graph:status:
    desc: "Show the last 5 graph pipeline executions"
    summary: |
      Lists recent Step Functions executions for the graph pipeline,
      showing status and start time.

      Example:
        task graph:status
    deps: [init]
    cmds:
      - |
        GRAPH_STATE_MACHINE_ARN=$(terraform -chdir={{.TF_DIR}} output -raw graph_state_machine_arn 2>/dev/null || echo "")
        if [ -z "${GRAPH_STATE_MACHINE_ARN}" ]; then
          echo "No graph state machine found — is create_neptune=true?"
          exit 0
        fi
        aws stepfunctions list-executions \
          --state-machine-arn "${GRAPH_STATE_MACHINE_ARN}" \
          --region            "{{.REGION}}" \
          --max-results       5 \
          --query "executions[].{Status:status, Started:startDate, Name:name}" \
          --output table

  # ── Preflight checks ────────────────────────────────────────────────────────

  preflight:
    desc: "Run all preflight checks: tools, auth, Python packages, files, Terraform"
    cmds:
      - task: preflight:tools
      - task: preflight:auth
      - task: preflight:python
      - task: preflight:files
      - task: preflight:terraform
      - echo ""
      - echo "All preflight checks passed."

  preflight:tools:
    desc: "Check required CLI tools are installed"
    cmds:
      - |
        fail=0
        for cmd in terraform aws python3 pip3 git bash shellcheck jq; do
          if command -v "$cmd" &>/dev/null; then
            ver=$("$cmd" --version 2>&1 | head -1)
            echo "OK: $cmd — $ver"
          else
            echo "MISSING: $cmd"
            fail=1
          fi
        done
        [ "$fail" -ne 0 ] && { echo "Install missing tools and re-run."; exit 1; } || true
      - |
        tf_ver=$(terraform version -json 2>/dev/null | jq -r '.terraform_version // empty')
        [ -z "$tf_ver" ] && tf_ver=$(terraform version 2>/dev/null | head -1 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
        major=$(echo "$tf_ver" | cut -d. -f1); minor=$(echo "$tf_ver" | cut -d. -f2)
        if [ "$major" -ge 2 ] || { [ "$major" -eq 1 ] && [ "$minor" -ge 5 ]; }; then
          echo "OK: Terraform $tf_ver (>= 1.5)"
        else
          echo "FAIL: Terraform $tf_ver — need >= 1.5"; exit 1
        fi
      - |
        py_ver=$({{.PYTHON}} -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')" 2>/dev/null || python3 -c "import sys; print(f'{sys.version_info.major}.{sys.version_info.minor}')")
        py_major=$(echo "$py_ver" | cut -d. -f1); py_minor=$(echo "$py_ver" | cut -d. -f2)
        if [ "$py_major" -ge 3 ] && [ "$py_minor" -ge 11 ]; then
          echo "OK: Python $py_ver (>= 3.11)"
        else
          echo "FAIL: Python $py_ver — need >= 3.11"; exit 1
        fi

  preflight:auth:
    desc: "Check AWS authentication and credentials"
    cmds:
      - |
        if [ -n "$AWS_ACCESS_KEY_ID" ] && [ -n "$AWS_SECRET_ACCESS_KEY" ]; then
          echo "OK: AWS_ACCESS_KEY_ID set (${AWS_ACCESS_KEY_ID:0:4}****)"
          [ -n "$AWS_SESSION_TOKEN" ] && echo "OK: AWS_SESSION_TOKEN set (temporary credentials)"
          cred_source="environment variables"
        elif [ -f "$HOME/.aws/credentials" ] || [ -f "$HOME/.aws/config" ]; then
          cred_source="~/.aws profile"
        else
          cred_source="instance profile / IRSA / ECS task role"
        fi
        if aws sts get-caller-identity &>/dev/null; then
          ACCT=$(aws sts get-caller-identity --query Account --output text)
          ARN=$(aws sts get-caller-identity --query Arn --output text)
          echo "OK: Authenticated as ${ARN} (account ${ACCT}) via ${cred_source}"
          echo "OK: AWS region is {{.REGION}}"
        else
          echo "FAIL: No valid AWS credentials."
          echo "  aws configure | aws sso login --profile my-profile | export AWS_ACCESS_KEY_ID=..."
          exit 1
        fi

  preflight:python:
    desc: "Check Python packages required by pipeline scripts"
    cmds:
      - |
        fail=0
        for pkg in yaml requests pytest bs4 boto3; do
          if {{.PYTHON}} -c "import $pkg" 2>/dev/null || python3 -c "import $pkg" 2>/dev/null; then
            echo "OK: $pkg"
          else
            echo "MISSING: $pkg"; fail=1
          fi
        done
        [ "$fail" -ne 0 ] && { echo "pip install boto3 pyyaml requests pytest beautifulsoup4"; exit 1; } || true

  preflight:files:
    desc: "Check essential repository files are present"
    cmds:
      - |
        fail=0
        files=(
          terraform/versions.tf
          terraform/variables.tf
          terraform/main.tf
          terraform/outputs.tf
          terraform/bootstrap/main.tf
          step-functions/rag_pipeline.asl.json
          step-functions/graph_pipeline.asl.json
          codebuild/buildspec.yml
          codebuild/buildspec_graph.yml
          codebuild/scripts/clone_repos.sh
          codebuild/scripts/discover_modules.py
          codebuild/scripts/process_docs.py
          codebuild/scripts/requirements.txt
          scripts/test_retrieval.py
          scripts/run_pipeline.sh
          scripts/deploy.sh
        )
        for f in "${files[@]}"; do
          if [ -f "$f" ]; then
            echo "OK: $f"
          else
            echo "MISSING: $f"; fail=1
          fi
          if [[ "$f" == *.sh ]] && [ -f "$f" ] && [ ! -x "$f" ]; then echo "WARN: $f not executable"; fi
        done
        if [ "$fail" -ne 0 ]; then echo "Repository incomplete."; exit 1; fi

  preflight:terraform:
    desc: "Check Terraform formatting and syntax"
    cmds:
      - |
        if terraform -chdir={{.TF_DIR}} fmt -check -recursive 2>/dev/null; then
          echo "OK: Terraform formatting"
        else
          echo "FAIL: Run 'task fmt'"; exit 1
        fi
      - |
        if terraform -chdir={{.TF_DIR}} init -backend=false -input=false &>/dev/null && \
           terraform -chdir={{.TF_DIR}} validate &>/dev/null; then
          echo "OK: Terraform validates"
        else
          echo "FAIL: Run 'terraform -chdir={{.TF_DIR}} validate'"; exit 1
        fi

  # ── Claude Code / Bedrock ───────────────────────────────────────────────────

  claude:setup:
    desc: "Configure Claude Code to use Amazon Bedrock as its backend"
    summary: |
      Sets environment variables so Claude Code routes LLM calls through
      Amazon Bedrock instead of the Anthropic API directly.

      Optional vars:
        CLAUDE_REGION  — Bedrock region (default: us-east-1)
        CLAUDE_MODEL   — model ID (default: claude-sonnet-4-20250514)
        PERSIST=true   — append exports to ~/.bashrc

      Example:
        task claude:setup
        task claude:setup CLAUDE_REGION=us-west-2
        task claude:setup PERSIST=true
    vars:
      CLAUDE_REGION: '{{.CLAUDE_REGION | default "us-east-1"}}'
      CLAUDE_MODEL: '{{.CLAUDE_MODEL | default "claude-sonnet-4-20250514"}}'
    cmds:
      - |
        source scripts/setup_claude_bedrock.sh \
          --region {{.CLAUDE_REGION}} \
          --model  {{.CLAUDE_MODEL}} \
          {{if eq .PERSIST "true"}}--persist{{end}}

  # ── MCP server ──────────────────────────────────────────────────────────────

  mcp:install:
    desc: "Install MCP server dependencies into .venv"
    cmds:
      - "{{.PYTHON}} -m pip install -r mcp/requirements.txt --quiet"
      - echo "MCP dependencies installed."

  mcp:setup:
    desc: "Register the MCP server with Claude Code (.claude/settings.local.json)"
    summary: |
      Writes the hashicorp-rag mcpServers entry into .claude/settings.local.json
      so Claude Code starts the MCP server automatically on open.

      After running, restart Claude Code — search_hashicorp_docs and
      get_index_info tools will be available automatically.

      Example:
        task mcp:setup KENDRA_INDEX_ID=ABCDEFGHIJ
    requires:
      vars: [KENDRA_INDEX_ID]
    cmds:
      - |
        scripts/setup_mcp.sh \
          --region          {{.REGION}} \
          --kendra-index-id {{.KENDRA_INDEX_ID}}

  mcp:test:
    desc: "Smoke-test the MCP server tools against the live Kendra index"
    summary: |
      Calls MCP server tool functions directly to confirm credentials,
      environment, and retrieval are all working.

      Example:
        task mcp:test KENDRA_INDEX_ID=ABCDEFGHIJ
    requires:
      vars: [KENDRA_INDEX_ID]
    env:
      AWS_REGION: "{{.REGION}}"
      AWS_KENDRA_INDEX_ID: "{{.KENDRA_INDEX_ID}}"
    cmds:
      - "{{.PYTHON}} mcp/test_server.py"

  # ── CI helpers ──────────────────────────────────────────────────────────────

  ci:
    desc: "Run all CI checks locally (fmt:check + validate + shellcheck + tests)"
    cmds:
      - task: fmt:check
      - task: validate
      - task: shellcheck
      - task: test

  shellcheck:
    desc: "Run shellcheck on all shell scripts"
    cmds:
      - find scripts codebuild/scripts -name "*.sh" | xargs shellcheck

  test:
    desc: "Run Python unit tests"
    cmds:
      - "{{.PYTHON}} -m pytest codebuild/scripts/tests/ -v"
